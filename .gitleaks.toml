# gitleaks configuration. Inherits the default rule pack
# (Solana keypairs, AWS, GCP, GitHub, npm, JWT, generic high-entropy
# strings). The allowlist below only suppresses known-safe paths.
#
# Updated as part of secret-scan.yml — see that workflow's top
# comment for the policy.

[extend]
useDefault = true

[allowlist]
description = "AgentTrust deliberate-demo keypairs and example envs"
paths = [
  # Deliberately committed demo attestor keypair (gitignored, but
  # explicit). Holds no real funds; rotated per demo run via
  # `loadOrCreateKeypair` in the attestor-demo script.
  '''examples/attestor-demo/attestor-keypair\.json''',
  # Pay.sh demo's mint + payer keypairs — same pattern: regenerated
  # by the smoke script on demand, only ever airdropped test SOL.
  '''examples/pay-sh-demo/devnet-mint-keypair\.json''',
  '''examples/pay-sh-demo/devnet-payer-keypair\.json''',
  # `.example.env` files document the env-var schema; no real values.
  '''.*\.example\.env$''',
  # docs/proofs/ contains public Solana addresses, transaction
  # signatures, and PDA listings — all on-chain public data, not
  # secrets. The high-entropy base58 strings (typically 32–88 chars)
  # trip the generic-api-key rule.
  '''docs/proofs/.*\.md$''',
  '''docs/proofs/.*\.json$''',
  # Devnet smoke + counterparty + attestor traces — all public
  # on-chain artefacts captured for verification, never secrets.
  '''examples/.*/devnet-.*\.json$''',
  # Anchor program keypairs under keys/ generate the deployed
  # program IDs (8Y6f… / HF8z… / Cx4R…). They identify the program
  # but do NOT control deploy authority — that's a separate keypair
  # never in repo. Standard practice for public Anchor codebases.
  '''keys/.*-keypair\.json''',
  # Gate-E2E submission artifacts: forensic JSON-RPC traces, on-chain
  # state dumps, ephemeral debug scripts. Wallet secrets are kept out
  # by .gitignore (test-wallet.json + test-wallet.b58); the remaining
  # files contain only public on-chain data + `const secret = bs58
  # .decode(KEYPAIR_B58)` variable-name patterns that the generic
  # -api-key rule flags as false positives.
  '''submission/e2e-claude-code-.*''',
  '''submission/e2e-verification-.*''',
]

# Suppress matches by content. Generic-api-key + high-entropy
# rules occasionally flag inline base58 program IDs, transaction
# signatures, and PDA addresses we cite in markdown. Surfacing
# those as "secrets" is pure noise.
regexes = [
  # Solana base58 addresses (32-44 chars; the 32-byte ed25519 pub
  # encoding lands in this range). Documented widely in our docs +
  # READMEs as program IDs / counterparty addresses / transaction
  # signatures. None are secrets.
  '''[1-9A-HJ-NP-Za-km-z]{32,44}''',
  # Solana transaction signatures are 64-byte ed25519 sigs encoded
  # as base58, typically 87-88 chars. Same false-positive class.
  '''[1-9A-HJ-NP-Za-km-z]{86,90}''',
]
