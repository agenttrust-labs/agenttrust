name: Kani Formal Verification

# Tightened from `programs/policy-vault/src/**` to the three subdirs
# the proofs actually exercise. A README/comment bump under the
# program no longer triggers a 90s+ proof run.

on:
  pull_request:
    paths:
      - 'programs/policy-vault/src/policies/**'
      - 'programs/policy-vault/src/proofs/**'
      - 'programs/policy-vault/src/state/**'
      - 'programs/policy-vault/Cargo.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/kani-prove.yml'
  push:
    branches: [main]
    paths:
      - 'programs/policy-vault/src/policies/**'
      - 'programs/policy-vault/src/proofs/**'
      - 'programs/policy-vault/src/state/**'
      - 'programs/policy-vault/Cargo.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/kani-prove.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  KANI_VERSION: '0.67.0'

jobs:
  prove:
    name: Prove 6 PolicyVault invariants
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      # Cache kani-verifier + the bundled CBMC sysroot. The
      # model-checking/kani-github-action installs via a pre-built
      # tarball but still downloads + extracts on every cold run
      # (~30s). Caching the cargo bin + Kani's internal install dir
      # lets the action's "already-installed" check skip the network
      # round-trip.
      - name: Cache Kani ${{ env.KANI_VERSION }}
        id: cache-kani
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/kani
            ~/.cargo/bin/cargo-kani
            ~/.kani
          key: ${{ runner.os }}-kani-${{ env.KANI_VERSION }}

      # Cache cargo registry + the policy-vault target/ from prior
      # proof runs. Keyed on Cargo.lock; restore-keys allow a
      # partial hit when the lockfile changes.
      - name: Cache Cargo + proof target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            programs/policy-vault/target
          key: ${{ runner.os }}-kani-cargo-${{ env.KANI_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-kani-cargo-${{ env.KANI_VERSION }}-

      - name: Install Kani
        # The cache step above restores ~/.cargo/bin/{kani,cargo-kani} +
        # ~/.kani when the version-keyed cache hits. The kani-github-action
        # internally runs `cargo install --locked kani-verifier` without
        # --force, which errors with "binary already exists in destination"
        # when the cache restored those binaries first. Skipping the action
        # on a cache hit avoids the conflict; the cached install is already
        # complete (cargo kani setup runs against the cached ~/.kani).
        if: steps.cache-kani.outputs.cache-hit != 'true'
        uses: model-checking/kani-github-action@v1.1
        with:
          kani-version: ${{ env.KANI_VERSION }}

      - name: Prove invariants
        working-directory: programs/policy-vault
        run: |
          cargo kani --harness paused_killswitch_implies_no_allow
          cargo kani --harness velocity_allow_implies_cumulative_le_max
          cargo kani --harness counterparty_tier_monotone
          cargo kani --harness validation_expiry_correct
          cargo kani --harness multisig_threshold_enforced
          cargo kani --harness strict_returns_ok_iff_allow
          cargo kani --harness gate_decision_is_one_of_three_disjoint_variants

      - name: Summary
        if: success()
        run: echo "All 6 PolicyVault invariants proven green."
