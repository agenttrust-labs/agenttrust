name: Anchor end-to-end tests

on:
  pull_request:
    paths:
      - 'programs/**'
      - 'Anchor.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'tests/**'
      - 'trustgate/sdk/src/**'
      - '.github/workflows/anchor-test.yml'
    # NOTE on docs-only diffs: GitHub Actions rejects `paths` +
    # `paths-ignore` at the same trigger level (HTTP 422 "you may
    # only define one"). The allowlist above is tight enough that a
    # **.md or docs/** edit doesn't match — so docs-only changes
    # don't trigger this workflow without a separate ignore-list.
  push:
    branches: [main]
    paths:
      - 'programs/**'
      - 'Anchor.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'tests/**'
      - 'trustgate/sdk/src/**'
      - '.github/workflows/anchor-test.yml'
  workflow_dispatch:

# Cancel in-flight runs on the same branch / PR. A new push supersedes
# the previous one; CI minutes only flow into the most recent commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin every binary version we cache against. Bumps go in env so a
  # one-line edit propagates through every cache key below.
  SOLANA_VERSION: '3.1.14'
  ANCHOR_VERSION: '1.0.1'
  RUST_VERSION:   '1.86.0'

jobs:
  anchor:
    name: anchor build + test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      # Cache Cargo registry + git index. Restore-keys allow a
      # partial hit when Cargo.lock changes (most source updates
      # don't touch the lockfile, so this saves ~1 min).
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Cache Anchor target/. Anchor.toml change invalidates because
      # it pins program IDs which feed into the .so binary contents.
      - name: Cache Anchor target
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-anchor-target-${{ hashFiles('**/Cargo.lock', 'Anchor.toml') }}
          restore-keys: |
            ${{ runner.os }}-anchor-target-

      # Cache the Solana CLI install dir keyed on version. The
      # release.anza.xyz tarball is pinned, so a hit means we skip
      # the ~30s download + extract.
      - name: Cache Solana CLI ${{ env.SOLANA_VERSION }}
        id: cache-solana
        uses: actions/cache@v4
        with:
          path: ~/.local/share/solana
          key: ${{ runner.os }}-solana-${{ env.SOLANA_VERSION }}

      - name: Install Solana CLI
        # 3.1.14 is the floor we have local-validator coverage
        # against. 2.1.16 (prior pin) hit a cargo-build-sbf panic
        # at sdk/cargo-build-sbf/src/main.rs:146 — platform-tools
        # layout changed between 2.x and 3.x; Anchor 1.0.1 is
        # tested against the 3.x layout.
        if: steps.cache-solana.outputs.cache-hit != 'true'
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${SOLANA_VERSION}/install)"

      # Always export PATH (cache-hit and miss alike).
      - name: Export Solana CLI on PATH
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Verify Solana installation
        run: |
          solana --version
          solana-test-validator --version

      - name: Bootstrap a fresh provider wallet
        # Anchor.toml's [provider] wallet defaults to
        # ~/.config/solana/id.json. The CI runner has no such file;
        # without it anchor test errors with
        # `Unable to read keypair file (~/.config/solana/id.json)`.
        # Generate a throwaway keypair — the local validator anchor
        # spins up airdrops genesis SOL to it for the duration of
        # the test run.
        run: |
          mkdir -p "$HOME/.config/solana"
          solana-keygen new --no-bip39-passphrase --force \
            --outfile "$HOME/.config/solana/id.json"
          solana config set --keypair "$HOME/.config/solana/id.json"

      # Cache rustup's toolchain dir. ~1 min saved vs a fresh
      # `rustup default 1.86.0` that re-downloads the toolchain.
      - name: Cache rustup toolchain ${{ env.RUST_VERSION }}
        id: cache-rustup
        uses: actions/cache@v4
        with:
          path: ~/.rustup
          key: ${{ runner.os }}-rustup-${{ env.RUST_VERSION }}-rustfmt-clippy

      - name: Install Rust toolchain
        # 1.86.0 is the floor for current Anchor source — icu_*
        # crates pulled by the Anchor 1.0.x build chain need it
        # (`error: package icu_normalizer requires rustc 1.86`).
        run: |
          rustup default ${RUST_VERSION}
          rustup component add rustfmt clippy

      # Cache AVM + Anchor binary. cargo install avm rebuilds avm
      # from source (~5 min cold) — by far the slowest single step
      # before this cache. Hit = ~3 s instead.
      - name: Cache AVM + Anchor ${{ env.ANCHOR_VERSION }}
        id: cache-anchor
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/avm
            ~/.cargo/bin/anchor
            ~/.avm
          key: ${{ runner.os }}-anchor-${{ env.ANCHOR_VERSION }}-rust-${{ env.RUST_VERSION }}

      - name: Install AVM + Anchor ${{ env.ANCHOR_VERSION }}
        if: steps.cache-anchor.outputs.cache-hit != 'true'
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --force --locked
          avm install ${ANCHOR_VERSION}
          avm use ${ANCHOR_VERSION}

      - name: Verify Anchor toolchain (cache-hit path)
        if: steps.cache-anchor.outputs.cache-hit == 'true'
        run: |
          avm use ${ANCHOR_VERSION}
          anchor --version

      - name: Restore program keypairs from secrets
        # `anchor build` emits target/deploy/<program>-keypair.json
        # if it doesn't exist; on a fresh CI checkout the keypair is
        # randomly generated and its pubkey diverges from the
        # source-code declare_id!. Anchor 1.0.1 hard-fails the build
        # with "Program ID mismatch detected" in that case.
        #
        # The canonical keypairs that generate the deployed program IDs
        # (8Y6f… / HF8z… / Cx4R…) are stored as repo secrets (the keys/
        # dir is gitignored and not in the checkout). Write them into
        # target/deploy/ before `anchor build` so the keypair check
        # passes and the produced .so files can be deployed (in
        # `anchor test`) at the source-declared IDs.
        env:
          POLICY_VAULT_KEYPAIR: ${{ secrets.POLICY_VAULT_KEYPAIR }}
          TRUSTGATE_KEYPAIR: ${{ secrets.TRUSTGATE_KEYPAIR }}
          VALIDATION_REGISTRY_KEYPAIR: ${{ secrets.VALIDATION_REGISTRY_KEYPAIR }}
        run: |
          mkdir -p target/deploy
          printf '%s' "$POLICY_VAULT_KEYPAIR"        > target/deploy/policy_vault-keypair.json
          printf '%s' "$TRUSTGATE_KEYPAIR"           > target/deploy/trustgate-keypair.json
          printf '%s' "$VALIDATION_REGISTRY_KEYPAIR" > target/deploy/validation_registry-keypair.json

      - name: Anchor build (skip-lint disabled per Anchor.toml)
        run: anchor build

      - name: Anchor test (uses local validator with Quantu mainnet clones)
        # --provider.cluster localnet: override Anchor.toml's
        #   `cluster = "devnet"` — without this, `anchor test` deploys
        #   to live devnet, which fails on upgrade-authority mismatch
        #   because CI's throwaway wallet isn't the deploy authority.
        # --validator legacy: anchor 1.0.1 defaults to surfpool;
        #   surfpool isn't installed in CI (or locally). Solana CLI's
        #   own solana-test-validator handles the [test.validator]
        #   block in Anchor.toml.
        # --skip-build: we already ran `anchor build` above.
        run: anchor test --skip-build --provider.cluster localnet --validator legacy
