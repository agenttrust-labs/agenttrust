name: Anchor end-to-end tests

on:
  pull_request:
    paths:
      - 'programs/**'
      - 'Anchor.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'tests/**'
      - 'trustgate/sdk/src/**'
      - 'keys/**'
      - '.github/workflows/anchor-test.yml'
    # Anchor build + test is the heaviest workflow (~15 min cold);
    # never run it for a docs-only diff.
    paths-ignore:
      - '**.md'
      - '**.mdx'
      - 'docs/**'
      - 'references/**'
  push:
    branches: [main]
    paths:
      - 'programs/**'
      - 'Anchor.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'tests/**'
      - 'trustgate/sdk/src/**'
      - 'keys/**'
      - '.github/workflows/anchor-test.yml'
  workflow_dispatch:

# Cancel in-flight runs on the same branch / PR. A new push supersedes
# the previous one; CI minutes only flow into the most recent commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  anchor:
    name: anchor build + test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Anchor target
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-anchor-target-${{ hashFiles('**/Cargo.lock', 'Anchor.toml') }}

      - name: Install Solana CLI
        # 3.1.14 is the floor we have local-validator coverage against.
        # 2.1.16 (the prior pin) was hitting a `cargo-build-sbf` panic
        # at `sdk/cargo-build-sbf/src/main.rs:146` with
        # `Os { code: 2, kind: NotFound }` when `anchor build` ran on
        # the fresh CI runner — the platform-tools toolchain layout
        # changed shape between 2.x and 3.x, and Anchor 1.0.1 is
        # tested against the 3.x layout.
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v3.1.14/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Verify Solana installation
        run: |
          solana --version
          solana-test-validator --version

      - name: Bootstrap a fresh provider wallet
        # Anchor.toml's [provider] wallet defaults to
        # ~/.config/solana/id.json. The CI runner has no such file;
        # without it anchor test errors with
        # `Unable to read keypair file (~/.config/solana/id.json)`.
        # Generate a throwaway keypair — the local validator anchor
        # spins up airdrops genesis SOL to it for the duration of
        # the test run.
        run: |
          mkdir -p "$HOME/.config/solana"
          solana-keygen new --no-bip39-passphrase --force \
            --outfile "$HOME/.config/solana/id.json"
          solana config set --keypair "$HOME/.config/solana/id.json"

      - name: Install Rust toolchain
        # 1.86.0 is the floor for current Anchor source — the icu_*
        # crates pulled by the Anchor 1.0.x build chain require it
        # (`error: package icu_normalizer requires rustc 1.86`).
        # Bumped from 1.85.0 (which we'd just bumped to from 1.83).
        run: |
          rustup default 1.86.0
          rustup component add rustfmt clippy

      - name: Install AVM + Anchor 1.0.1
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --force --locked
          avm install 1.0.1
          avm use 1.0.1

      - name: Restore program keypairs from keys/
        # `anchor build` emits target/deploy/<program>-keypair.json
        # if it doesn't exist; on a fresh CI checkout the keypair is
        # randomly generated and its pubkey diverges from the
        # source-code declare_id!. Anchor 1.0.1 hard-fails the build
        # with "Program ID mismatch detected" in that case.
        #
        # The keys/ dir holds the canonical keypairs that generate
        # the deployed program IDs (8Y6f… / HF8z… / Cx4R…) — these
        # are NOT secrets (any deploy authority is a separate key),
        # they just identify the on-chain program. Copy them into
        # target/deploy/ before `anchor build` so the keypair check
        # passes and the produced .so files can be deployed (in
        # `anchor test`) at the source-declared IDs.
        run: |
          mkdir -p target/deploy
          cp keys/policy_vault-keypair.json        target/deploy/policy_vault-keypair.json
          cp keys/trustgate-keypair.json           target/deploy/trustgate-keypair.json
          cp keys/validation_registry-keypair.json target/deploy/validation_registry-keypair.json

      - name: Anchor build (skip-lint disabled per Anchor.toml)
        run: anchor build

      - name: Anchor test (uses local validator with Quantu mainnet clones)
        # --provider.cluster localnet: override Anchor.toml's
        #   `cluster = "devnet"` — without this, `anchor test` deploys
        #   to live devnet, which fails on upgrade-authority mismatch
        #   because CI's throwaway wallet isn't the deploy authority.
        # --validator legacy: anchor 1.0.1 defaults to surfpool;
        #   surfpool isn't installed in CI (or locally). Solana CLI's
        #   own solana-test-validator handles the [test.validator]
        #   block in Anchor.toml.
        # --skip-build: we already ran `anchor build` above.
        run: anchor test --skip-build --provider.cluster localnet --validator legacy
