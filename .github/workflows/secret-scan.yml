name: Secret scan

# Catches accidentally committed Solana keypairs, RPC API keys, npm
# tokens, JWTs, AWS keys, etc. — anything an attacker (or a judge
# cloning the repo) could drain or impersonate.
#
# Runs gitleaks against the diff on every push + PR. The scan is
# diff-only on PRs (fast); on push to main it scans the full history
# of the new commits. Either way the goal is "no new secret reaches
# main."
#
# Allowlist (in .gitleaks.toml): the demo attestor keypair lives at
# examples/attestor-demo/attestor-keypair.json — it's a deliberate
# fresh demo wallet with no real funds, gitignored, and never holds
# anything sensitive. *.example.env files document required keys
# without containing real values.
#
# Trigger: every push + PR.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  scan:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch enough history that PR base..HEAD diff is meaningful.
          # PR diffs use the merge-base; main pushes use the previous
          # main HEAD as the base. 100 commits covers most real-world
          # PR sizes; for absurdly long PRs we'd need fetch-depth: 0.
          fetch-depth: 100

      # Install the gitleaks binary directly from the official
      # GitHub release rather than using gitleaks/gitleaks-action@v2.
      # The action wrapper requires a paid commercial license for
      # GitHub organizations; the underlying gitleaks binary is MIT-
      # licensed and free for any use. Pin to a specific release so
      # the rule-pack version is reproducible.
      - name: Install gitleaks binary
        env:
          GITLEAKS_VERSION: '8.18.4'
        run: |
          set -e
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks against the diff
        env:
          # Pull-request: scan the merge-base..HEAD range so we only
          # flag NEW secrets the PR introduces. Push to main: scan
          # the last 100 commits range. Anything older has either
          # already been caught or grandfathered.
          BASE_REF: ${{ github.event.pull_request.base.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -e
          if [ -n "$BASE_REF" ] && [ "$BASE_REF" != "0000000000000000000000000000000000000000" ]; then
            range="${BASE_REF}..${HEAD_REF}"
          else
            # Push event — BASE_REF is empty on the first push of a
            # branch. Fall back to scanning the most recent 50 commits
            # (a regression caught here would be one we just landed).
            range="HEAD~50..HEAD"
          fi
          # `--config` is the gitleaks-binary equivalent of the action's
          # `config-path` input. `--log-opts` forwards the commit range
          # to the underlying git log call.
          gitleaks detect \
            --config .gitleaks.toml \
            --log-opts "$range" \
            --redact \
            --no-banner \
            --verbose
