name: Secret scan

# Catches accidentally committed Solana keypairs, RPC API keys, npm
# tokens, JWTs, AWS keys, etc. — anything an attacker (or a judge
# cloning the repo) could drain or impersonate.
#
# Runs gitleaks against the diff on every push + PR. The scan is
# diff-only on PRs (fast); on push to main it scans the full history
# of the new commits. Either way the goal is "no new secret reaches
# main."
#
# Allowlist (in .gitleaks.toml): the demo attestor keypair lives at
# examples/attestor-demo/attestor-keypair.json — it's a deliberate
# fresh demo wallet with no real funds, gitignored, and never holds
# anything sensitive. *.example.env files document required keys
# without containing real values.
#
# Trigger: every push + PR.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  scan:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch enough history that PR base..HEAD diff is meaningful.
          # PR diffs use the merge-base; main pushes use the previous
          # main HEAD as the base. 100 commits covers most real-world
          # PR sizes; for absurdly long PRs we'd need fetch-depth: 0.
          fetch-depth: 100

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Use the project-local config so the allowlist for the
          # attestor demo keypair stays in version control.
          config-path: .gitleaks.toml
