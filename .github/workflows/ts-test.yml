name: TypeScript build + unit tests

on:
  pull_request:
    paths:
      - 'trustgate/**'
      - 'mcp/**'
      - 'examples/**'
      - 'web/**'
      - 'docs-site/**'
      - 'tests/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '**/tsconfig*.json'
      - '.github/workflows/ts-test.yml'
  push:
    branches: [main]
    paths:
      - 'trustgate/**'
      - 'mcp/**'
      - 'examples/**'
      - 'web/**'
      - 'docs-site/**'
      - 'tests/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '**/tsconfig*.json'
      - '.github/workflows/ts-test.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job-level path filter. Each downstream job consults the matching
  # output to decide whether to run. Push events (main) skip the
  # filter and run every job — that's the last line of defense
  # before a deploy. PRs filter to just the workspaces that changed.
  changes:
    name: detect changed workspaces
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      sdk:    ${{ steps.filter.outputs.sdk }}
      server: ${{ steps.filter.outputs.server }}
      demo:   ${{ steps.filter.outputs.demo }}
      mcp:    ${{ steps.filter.outputs.mcp }}
      web:    ${{ steps.filter.outputs.web }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # The filter compares head ref vs base ref on PRs. On
          # push events it diffs against the previous commit.
          filters: |
            shared:
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - '**/tsconfig*.json'
              - '.github/workflows/ts-test.yml'
            sdk:
              - 'trustgate/sdk/**'
            server:
              - 'trustgate/server/**'
              - 'trustgate/sdk/**'   # server imports the SDK
            demo:
              - 'examples/pay-sh-demo/**'
              - 'trustgate/server/**' # demo imports server
              - 'trustgate/sdk/**'    # …and the SDK
            mcp:
              - 'mcp/**'
              - 'trustgate/sdk/**'    # mcp imports the SDK
            web:
              - 'web/**'
              - 'docs-site/**'
              - 'tests/**'

  sdk:
    name: '@agenttrust-sdk/trustgate — build + unit tests'
    needs: changes
    if: needs.changes.outputs.sdk == 'true' || needs.changes.outputs.shared == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - name: Install workspace deps
        run: pnpm install --frozen-lockfile
      - name: Build SDK
        run: pnpm --filter ./trustgate/sdk run build
      - name: SDK unit tests
        run: pnpm --filter ./trustgate/sdk test

  server:
    name: trustgate/server — unit tests
    needs: changes
    if: needs.changes.outputs.server == 'true' || needs.changes.outputs.shared == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - name: Install workspace deps
        run: pnpm install --frozen-lockfile
      # SDK dist must exist before server can typecheck — server
      # imports from @agenttrust-sdk/trustgate which resolves to
      # trustgate/sdk/dist/index.{js,d.ts} via the package's `main`
      # + `types` fields.
      - name: Build SDK (server workspace dep)
        run: pnpm --filter ./trustgate/sdk run build
      - name: Type-check server
        run: pnpm --filter ./trustgate/server exec tsc --noEmit
      - name: Server unit tests
        run: pnpm --filter ./trustgate/server test

  demo:
    name: examples/pay-sh-demo — build + unit-flow tests
    needs: changes
    if: needs.changes.outputs.demo == 'true' || needs.changes.outputs.shared == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - name: Install workspace deps
        run: pnpm install --frozen-lockfile
      # SDK + server dist must both exist before demo can typecheck.
      # Demo imports from @agenttrust-sdk/trustgate AND
      # @agenttrust/trustgate-server; both resolve through their
      # respective dist/ outputs.
      - name: Build SDK (demo transitive dep)
        run: pnpm --filter ./trustgate/sdk run build
      - name: Build trustgate-server (demo workspace dep)
        run: pnpm --filter ./trustgate/server run build
      - name: Type-check + build demo
        run: pnpm --filter ./examples/pay-sh-demo run build
      - name: Demo flow tests (supertest, no devnet)
        run: pnpm --filter ./examples/pay-sh-demo test

  mcp:
    name: '@agenttrust-sdk/mcp — build + unit tests'
    needs: changes
    if: needs.changes.outputs.mcp == 'true' || needs.changes.outputs.shared == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - name: Install workspace deps
        run: pnpm install --frozen-lockfile
      - name: Build SDK (mcp workspace dep)
        run: pnpm --filter ./trustgate/sdk run build
      - name: Build MCP server
        run: pnpm --filter ./mcp run build
      - name: MCP unit tests
        run: pnpm --filter ./mcp test

  web:
    name: web — Next.js production build
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - name: Install workspace deps
        run: pnpm install --frozen-lockfile
      # Next.js build cache. Lock to web's package.json + the
      # workspace lockfile; restore-keys allow a partial hit when
      # only source files (not deps) changed — saves ~30s.
      - name: Cache Next.js build (web)
        uses: actions/cache@v4
        with:
          path: web/.next/cache
          key: ${{ runner.os }}-nextjs-web-${{ hashFiles('pnpm-lock.yaml', 'web/package.json') }}-${{ hashFiles('web/**.ts', 'web/**.tsx', 'web/**.css') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-web-${{ hashFiles('pnpm-lock.yaml', 'web/package.json') }}-
            ${{ runner.os }}-nextjs-web-
      - name: Next.js production build
        run: pnpm --filter ./web exec next build
