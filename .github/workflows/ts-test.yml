name: TypeScript build + unit tests

on:
  pull_request:
    paths:
      - 'trustgate/**'
      - 'web/**'
      - 'docs-site/**'
      - 'tests/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/ts-test.yml'
  push:
    branches: [main]
    paths:
      - 'trustgate/**'
      - 'web/**'
      - 'docs-site/**'
      - 'tests/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/ts-test.yml'
  workflow_dispatch:

jobs:
  sdk:
    name: '@agenttrust-sdk/trustgate — build + unit tests'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - name: Install workspace deps
        run: pnpm install --frozen-lockfile
      - name: Build SDK
        run: pnpm --filter ./trustgate/sdk run build
      - name: SDK unit tests
        run: pnpm --filter ./trustgate/sdk test

  server:
    name: trustgate/server — unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - name: Install workspace deps
        run: pnpm install --frozen-lockfile
      - name: Type-check server
        run: pnpm --filter ./trustgate/server exec tsc --noEmit
      - name: Server unit tests
        run: pnpm --filter ./trustgate/server test

  web:
    name: web — Next.js production build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - name: Install workspace deps
        run: pnpm install --frozen-lockfile
      - name: Next.js production build
        run: pnpm --filter ./web exec next build
