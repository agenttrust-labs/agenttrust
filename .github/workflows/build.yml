name: Build + Rust unit tests

# Sanity check ahead of anchor-test.yml: native cargo build + cargo
# test --lib gives faster feedback than the full anchor-test
# pipeline (no Solana CLI install, no AVM compile, no validator boot)
# while iterating on programs/. Overlaps in scope with anchor-test
# but answers the "does it compile?" question 5x faster.

on:
  pull_request:
    paths:
      - 'programs/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Anchor.toml'
      - '.github/workflows/build.yml'
    paths-ignore:
      - '**.md'
      - '**.mdx'
      - 'docs/**'
      - 'references/**'
  push:
    branches: [main]
    paths:
      - 'programs/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Anchor.toml'
      - '.github/workflows/build.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SOLANA_VERSION: '3.1.14'
  ANCHOR_VERSION: '1.0.1'

jobs:
  cargo-build:
    name: cargo build + cargo test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: cargo build (workspace)
        run: cargo build --workspace --locked

      - name: cargo test (Rust unit tests)
        run: cargo test --workspace --lib --locked

  anchor-build:
    name: anchor build (BPF)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-anchor-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-anchor-build-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Solana CLI install dir cached by version pin — saves the ~30s
      # download every run.
      - name: Cache Solana CLI ${{ env.SOLANA_VERSION }}
        id: cache-solana
        uses: actions/cache@v4
        with:
          path: ~/.local/share/solana
          key: ${{ runner.os }}-solana-${{ env.SOLANA_VERSION }}

      - name: Install Solana CLI ${{ env.SOLANA_VERSION }}
        if: steps.cache-solana.outputs.cache-hit != 'true'
        run: sh -c "$(curl -sSfL https://release.anza.xyz/v${SOLANA_VERSION}/install)"

      - name: Export Solana CLI on PATH
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      # AVM + Anchor binary cached — saves the ~5min cargo install
      # rebuild on every run.
      - name: Cache AVM + Anchor ${{ env.ANCHOR_VERSION }}
        id: cache-anchor
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/avm
            ~/.cargo/bin/anchor
            ~/.avm
          key: ${{ runner.os }}-anchor-${{ env.ANCHOR_VERSION }}-stable

      - name: Install Anchor ${{ env.ANCHOR_VERSION }}
        if: steps.cache-anchor.outputs.cache-hit != 'true'
        run: |
          cargo install --git https://github.com/solana-foundation/anchor avm --force --locked
          avm install ${ANCHOR_VERSION}
          avm use ${ANCHOR_VERSION}

      - name: Verify Anchor (cache-hit path)
        if: steps.cache-anchor.outputs.cache-hit == 'true'
        run: |
          avm use ${ANCHOR_VERSION}
          anchor --version

      # target/deploy/*-keypair.json is gitignored (deploy secret), so a fresh
      # runner generates a random keypair whose PID won't match declare_id!.
      # --ignore-keys skips that check; CI only needs to verify BPF compiles.
      - name: anchor build
        run: anchor build --ignore-keys
