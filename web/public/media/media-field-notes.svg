    @keyframes ring {
      0%, 100% { transform: scale(1); opacity: .28; }
      50% { transform: scale(1.04); opacity: .46; }
    }
    @keyframes ledger {
      to { stroke-dashoffset: -140; }
    }
    @media (prefers-reduced-motion: reduce) {
      .arrow, .ring, .ledger { animation: none; }
    }
  </style>
