<svg width="640" height="420" viewBox="0 0 640 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .route { stroke-dasharray: 12 16; animation: route 12s linear infinite; }
    .scan { animation: scan 5s ease-in-out infinite; }
    .node { animation: node 3.8s ease-in-out infinite; transform-origin: center; }
    @keyframes route {
      to { stroke-dashoffset: -180; }
    }
    @keyframes scan {
      0%, 100% { transform: translateY(0); opacity: .18; }
      50% { transform: translateY(86px); opacity: .52; }
    }
    @keyframes node {
      0%, 100% { opacity: .75; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.08); }
    }
    @media (prefers-reduced-motion: reduce) {
      .route, .scan, .node { animation: none; }
    }
  </style>
