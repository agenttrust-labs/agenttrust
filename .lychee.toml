# Lychee link-checker config. Loaded by .github/workflows/link-check.yml.
#
# Goals:
#   * Allowlist Solana Explorer + localhost (dev refs)
#   * Allowlist the private agenttrust-labs repo (lychee gets 404
#     unauthed; the link is correct for authed users)
#   * Retry transient 5xx; fail hard on 4xx

# Cache successful checks for 1 day so PR re-runs are fast.
cache       = true
max_cache_age = "1d"

# Network behaviour. Generous timeout + retries because Solana
# Explorer occasionally rate-limits.
timeout     = 20
max_retries = 3
retry_wait_time = 2

# Don't fail on 5xx — those are usually intermittent (Explorer rate
# limit, npm registry hiccup). The retry policy gives 3 attempts
# before lychee marks a URL "unreachable", which is what fails the
# workflow.
accept = [200, 201, 204, 301, 302, 304, 308, 403]

# User-agent — some sites (notably GitHub) 403 default crawler UAs.
user_agent = "lychee/agenttrust-link-check"

# NOTE: lychee 0.23.0 doesn't accept a `base` key in the TOML config;
# the equivalent is the `--base` CLI flag, set in
# `.github/workflows/link-check.yml`. Keeping this comment so a
# future bump that re-introduces the TOML key doesn't get
# duplicate-configured.

# Allowlist: regex patterns for URLs we never validate. These are
# legitimately not crawl-friendly.
exclude = [
  # Solana Explorer — rate-limits aggressive crawls. The on-chain
  # state these URLs reference is verified separately by the
  # daily-devnet-smoke workflow.
  "^https?://(?:explorer|solscan|solana\\.fm)\\.",
  # Local dev references in quickstart docs.
  "^https?://localhost",
  "^https?://127\\.0\\.0\\.1",
  # Private repo (lychee unauthed → 404; authed humans see the
  # repo correctly). Not load-bearing for an external-link check.
  "^https?://github\\.com/agenttrust-labs/agenttrust(/|$)",
  # Vercel preview URLs (rotate per deploy; not stable).
  "vercel\\.app/?$",
  # Internal docs links — explicit bypass (Option B per Phase R-docs
  # final report). Lychee resolves root-relative MDX links via the
  # `--base https://docs.agenttrust.tech` CLI flag (set in
  # `.github/workflows/link-check.yml`); excluding the same host here
  # means lychee builds the URL but skips the actual fetch.
  #
  # Rationale: lychee fetched against the live host would race against
  # fresh deploys (a PR adding /verification/foo would 404 until merge
  # + Vercel rebuild). The authoritative check for internal docs links
  # is the docs-site headless Playwright sweep at
  # `docs-site/scripts/headless-sweep.mjs`, which renders every MDX
  # page in the in-PR build at four viewport/theme combos (172 page
  # renders) and fails on any console error or non-200 status. It is
  # what catches broken internal links during the docs build, not
  # this lychee step.
  #
  # The trade-off is explicit: lychee here checks only EXTERNAL links
  # (npm, GitHub, Solana Explorer, Helius, fly.dev healthz, etc.) —
  # the things that can break out-of-band from the docs build.
  "^https?://docs\\.agenttrust\\.tech",
  # Hosted-service roots return 404 because each service only serves
  # its own routes (`api.agenttrust.tech/healthz`,
  # `demo.agenttrust.tech/protected`, etc.). The MDX cites the host
  # as a label (read: 'this is where the service lives'), not as a
  # destination. Their healthz paths are validated separately by the
  # daily-devnet-smoke + hosted-surface-check workflows.
  "^https?://(api|demo)\\.agenttrust\\.tech/?$",
  "^https?://agenttrust-(api|demo|mcp)\\.fly\\.dev/?$",
]

# Don't follow links inside fenced code blocks — they're usually
# example URLs, not real ones.
include_fragments = false
